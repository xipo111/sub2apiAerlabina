name: Manual Linux Binary Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build linux amd64 binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags embed -ldflags="-s -w" -trimpath -o sub2api ./cmd/server
          chmod +x sub2api
          sha256sum sub2api > sub2api.sha256
        working-directory: backend

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: sub2api-linux-amd64
          path: |
            backend/sub2api
            backend/sub2api.sha256
          retention-days: 7
